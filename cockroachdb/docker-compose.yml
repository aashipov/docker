networks:
  default:
    name: ${COMPOSE_PROJECT_NAME}

x-volumes: &postgres-volumes
  - ${HOME}/docker-volumes/cdb/data:/cockroach/cockroach-data:rw
  - ${HOME}/docker-volumes/cdb/ca-key:/root/ca-key:rw
  - ${HOME}/docker-volumes/cdb/certs:/root/certs:rw
  - ${HOME}/docker-volumes/cdb/extern:/cockroach/${POSTGRES}/extern/:rw
  - ./:/dump/:rw

services:
  postgres:
    image: ${COCKROACH_IMAGE}
    hostname: ${COMPOSE_PROJECT_NAME}
    container_name: ${COMPOSE_PROJECT_NAME}
    restart: unless-stopped
    ports:
      - "5432:26257"
      - "18080:8080"
    entrypoint: /dump/entrypoint-cdb.sh
    volumes: *postgres-volumes
    env_file: .env
