# mkdir -p ${HOME}/docker-volumes/yb/
# docker exec -it yb sh
# ./postgres/bin/ysql_dump -h postgres -U postgres --inserts -t aenaflight_2017_01 postgres -f /dump/dump.sql

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME}

x-volumes:
  &postgres-volumes
  - ${HOME}/docker-volumes/yb/:/home/yugabyte/yb_data:rw
  - ./:/dump/:rw

services:
  yugabytedb:
    image: ${YUGABYTE_IMAGE}
    hostname: ${COMPOSE_PROJECT_NAME}
    container_name: ${COMPOSE_PROJECT_NAME}
    restart: unless-stopped
    ports:
      - "5432:5433" # YSQL (PostgreSQL-compatible) API port
      - "9042:9042" # YCQL (Cassandra-compatible) API port
      - "15432:15433" # Admin UI port
    volumes: *postgres-volumes
    command: ["bin/yugabyted", "start", "--base_dir=/home/yugabyte/yb_data", "--background=false"]
    env_file: .env
    